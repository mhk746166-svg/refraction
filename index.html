<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>🚗 자동차로 배우는 빛의 굴절</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 20px;
    font-family: 'Pretendard', -apple-system, 'Malgun Gothic', sans-serif;
    background: linear-gradient(135deg, #fef3c7, #fce7f3);
    min-height: 100vh;
  }
  .wrap { max-width: 760px; margin: 0 auto; }
  h1 { text-align: center; color: #333; margin: 0 0 8px; font-size: 28px;}
  .sub { text-align:center; color:#666; margin-bottom: 16px; font-size: 15px;}
  .modes { display:flex; gap:8px; justify-content:center; margin-bottom:12px;}
  .modes button {
    padding:10px 22px; font-size:16px; font-weight:700; border:none; border-radius:10px;
    cursor:pointer; background:#e5e7eb; color:#374151; transition:all .15s;
  }
  .modes button.active { background:#3b82f6; color:white; transform:scale(1.05);}
  canvas { display:block; margin: 0 auto; border-radius:14px; box-shadow:0 6px 20px rgba(0,0,0,.15);}
  .presets { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin:14px 0 10px;}
  .presets button {
    padding:9px 14px; font-size:14px; font-weight:600; border:2px solid #d1d5db;
    border-radius:8px; background:white; cursor:pointer; transition:all .15s;
  }
  .presets button:hover { border-color:#3b82f6; }
  .presets button.active { background:#dbeafe; border-color:#3b82f6;}
  .controls { display:flex; gap:16px; justify-content:center; align-items:center; margin:12px 0; flex-wrap:wrap;}
  .slider-box { display:flex; align-items:center; gap:10px; background:white; padding:8px 14px; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,.08);}
  .slider-box label { font-weight:600; color:#374151;}
  .slider-box input[type=range]{ width:180px;}
  .slider-box .val { font-weight:700; color:#3b82f6; min-width:42px; text-align:right;}
  .go {
    display:block; margin:10px auto; padding:12px 36px; font-size:17px; font-weight:700;
    border:none; border-radius:12px; background:#10b981; color:white; cursor:pointer;
    box-shadow:0 4px 10px rgba(16,185,129,.3);
  }
  .go:hover { background:#059669;}
  .go:disabled { background:#9ca3af; cursor:not-allowed;}
  .speech {
    max-width: 700px; margin: 10px auto; padding: 14px 18px;
    background: #fef9c3; border-left:5px solid #eab308; border-radius:8px;
    font-size:15px; color:#422006; min-height:48px;
    line-height:1.5;
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>🚗 자동차로 배우는 빛의 굴절 💡</h1>
  <div class="sub">왜 빛은 물이나 유리로 들어갈 때 꺾일까요? 자동차로 이해해봐요!</div>

  <div class="modes">
    <button id="modeCar" class="active">🚗 자동차로 보기</button>
    <button id="modeLight">💡 빛으로 보기</button>
  </div>

  <canvas id="cv" width="700" height="560"></canvas>

  <div class="presets" id="presets"></div>

  <div class="controls">
    <div class="slider-box">
      <label>📐 기울어진 정도</label>
      <input type="range" id="angle" min="15" max="50" value="35" step="1">
      <span class="val" id="angleVal">35°</span>
    </div>
  </div>

  <button class="go" id="go">▶ 출발!</button>

  <div class="speech" id="speech">🚦 버튼을 눌러 자동차를 출발시켜 보세요!</div>
</div>

<script>
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const W = cv.width, H = cv.height;
const BOUNDARY_Y = H / 2;

// ===== 상황 정의 =====
const CAR_SCENARIOS = [
  { id:'road_mud',  name:'🛣️ 포장도로 → 🟫 진흙길',  top:'road', bottom:'mud',   ratio:0.55, maxAngle:50 },
  { id:'road_swamp',name:'🛣️ 포장도로 → ⬜ 늪',      top:'road', bottom:'swamp', ratio:0.38, maxAngle:50 },
  { id:'mud_road',  name:'🟫 진흙길 → 🛣️ 포장도로',  top:'mud',  bottom:'road',  ratio:1.55, maxAngle:38 },
];
const LIGHT_SCENARIOS = [
  { id:'air_water', name:'💨 공기 → 💧 물',    top:'air',   bottom:'water', ratio:0.75, maxAngle:50 },
  { id:'air_glass', name:'💨 공기 → 🔷 유리',  top:'air',   bottom:'glass', ratio:0.66, maxAngle:50 },
  { id:'water_air', name:'💧 물 → 💨 공기',    top:'water', bottom:'air',   ratio:1.33, maxAngle:45 },
];

let mode = 'car';
let scenario = CAR_SCENARIOS[0];
let incAngleDeg = 35;

// ===== 배경 그리기 =====
function drawMedium(type, y0, y1) {
  if (type==='road'){
    ctx.fillStyle = '#4b5563'; ctx.fillRect(0,y0,W,y1-y0);
    ctx.strokeStyle = '#fbbf24'; ctx.lineWidth=3; ctx.setLineDash([24,18]);
    ctx.beginPath(); ctx.moveTo(0,(y0+y1)/2); ctx.lineTo(W,(y0+y1)/2); ctx.stroke();
    ctx.setLineDash([]);
  } else if (type==='mud'){
    ctx.fillStyle = '#78350f'; ctx.fillRect(0,y0,W,y1-y0);
    ctx.fillStyle = '#92400e';
    for(let i=0;i<60;i++){
      const x=(i*83)%W, y=y0+((i*47)%(y1-y0));
      ctx.beginPath(); ctx.arc(x,y,5+((i*3)%6),0,Math.PI*2); ctx.fill();
    }
  } else if (type==='swamp'){
    ctx.fillStyle = '#6b7280'; ctx.fillRect(0,y0,W,y1-y0);
    ctx.fillStyle = 'rgba(209,213,219,0.6)';
    for(let i=0;i<50;i++){
      const x=(i*91)%W, y=y0+((i*53)%(y1-y0));
      ctx.beginPath(); ctx.arc(x,y,3+((i*2)%5),0,Math.PI*2); ctx.fill();
    }
    ctx.fillStyle='rgba(31,41,55,0.4)';
    for(let i=0;i<30;i++){
      const x=(i*131)%W, y=y0+((i*71)%(y1-y0));
      ctx.beginPath(); ctx.arc(x,y,8,0,Math.PI*2); ctx.fill();
    }
  } else if (type==='air'){
    const g = ctx.createLinearGradient(0,y0,0,y1);
    g.addColorStop(0,'#dbeafe'); g.addColorStop(1,'#bfdbfe');
    ctx.fillStyle=g; ctx.fillRect(0,y0,W,y1-y0);
  } else if (type==='water'){
    const g = ctx.createLinearGradient(0,y0,0,y1);
    g.addColorStop(0,'#2563eb'); g.addColorStop(1,'#1e40af');
    ctx.fillStyle=g; ctx.fillRect(0,y0,W,y1-y0);
    ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.lineWidth=1.5;
    for(let i=0;i<10;i++){
      ctx.beginPath();
      for(let x=0;x<=W;x+=10){
        ctx.lineTo(x, y0+20+i*26+Math.sin((x+i*50)/30)*4);
      }
      ctx.stroke();
    }
  } else if (type==='glass'){
    const g = ctx.createLinearGradient(0,y0,0,y1);
    g.addColorStop(0,'#67e8f9'); g.addColorStop(1,'#22d3ee');
    ctx.fillStyle=g; ctx.fillRect(0,y0,W,y1-y0);
    ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=2;
    for(let i=-H;i<W+H;i+=40){
      ctx.beginPath(); ctx.moveTo(i,y0); ctx.lineTo(i+80,y1); ctx.stroke();
    }
  }
}
function drawBoundary(){
  ctx.strokeStyle='rgba(255,255,255,0.9)'; ctx.lineWidth=2;
  ctx.setLineDash([6,5]);
  ctx.beginPath(); ctx.moveTo(0,BOUNDARY_Y); ctx.lineTo(W,BOUNDARY_Y); ctx.stroke();
  ctx.setLineDash([]);
}
function drawBackground(){
  drawMedium(scenario.top, 0, BOUNDARY_Y);
  drawMedium(scenario.bottom, BOUNDARY_Y, H);
  drawBoundary();
}

// ===== 자동차 시뮬레이션 =====
// 상태: 중심(cx,cy), 진행방향 각도 angle (y축 기준, 시계방향 양수)
// heading = (sin(angle), cos(angle))
// 왼쪽 바퀴 방향 leftVec = (cos(angle), -sin(angle))
const HALF_W = 26;     // 바퀴 간 거리 절반
const CAR_LEN = 60;    // 차체 길이

let car = null;
let trail = [];
let animId = null;

function speedAtY(y){
  // 기준 속도 1.0
  if (y < BOUNDARY_Y) return 1.0;
  return scenario.ratio;  // 아래쪽 매질의 상대속도
}

function initCar(){
  cancelAnimationFrame(animId);
  const angleRad = incAngleDeg * Math.PI/180;
  // 시작 위치: 왼쪽 위 영역 (왼쪽아래→오른쪽 위 가 아니라, 왼쪽 위에서 오른쪽 아래로 진행)
  // 각도 크면 더 왼쪽에서 출발해야 벽에 안 박음
  const margin = 40 + (incAngleDeg-15) * 3;
  car = {
    cx: margin + 30,
    cy: 50,
    angle: angleRad,
    started: false,
    phase: 0, // 0: 출발전, 1: 주행중, 2: 종료
    firstCrossWheel: null,
    firstCrossType: null, // 'slow' or 'fast'
  };
  trail = [];
  draw();
  setSpeech('🚦 버튼을 눌러 자동차를 출발시켜 보세요!');
}

function stepCar(){
  const dt = 1.0; // 프레임당
  const baseSpeed = 2.2;

  const leftVec = { x: Math.cos(car.angle), y: -Math.sin(car.angle) };
  const Lx = car.cx + HALF_W * leftVec.x;
  const Ly = car.cy + HALF_W * leftVec.y;
  const Rx = car.cx - HALF_W * leftVec.x;
  const Ry = car.cy - HALF_W * leftVec.y;

  const vL = baseSpeed * speedAtY(Ly);
  const vR = baseSpeed * speedAtY(Ry);

  // 먼저 속도 바뀐 바퀴 기록
  if (car.firstCrossWheel === null){
    const LinTop = Ly < BOUNDARY_Y, RinTop = Ry < BOUNDARY_Y;
    if (LinTop !== RinTop){
      // 한쪽만 경계 넘음
      const crossed = LinTop ? 'R' : 'L';
      car.firstCrossWheel = crossed;
      car.firstCrossType = scenario.ratio < 1 ? 'slow' : 'fast';
    }
  }

  // 선형속도 (중심)
  const vC = (vL + vR) / 2;
  const heading = { x: Math.sin(car.angle), y: Math.cos(car.angle) };
  car.cx += heading.x * vC * dt;
  car.cy += heading.y * vC * dt;

  // 각속도
  const omega = (vR - vL) / (2 * HALF_W);
  car.angle += omega * dt;

  trail.push({ Lx, Ly, Rx, Ry });
  if (trail.length > 400) trail.shift();

  draw();

  if (car.cy < H - 30 && car.cx > 10 && car.cx < W-10){
    animId = requestAnimationFrame(stepCar);
  } else {
    car.phase = 2;
    finishCar();
  }
}

function finishCar(){
  const wheel = car.firstCrossWheel || 'L';
  const wheelName = wheel === 'L' ? '🔴 왼쪽(L)' : '🔴 오른쪽(R)';
  const speedWord = car.firstCrossType === 'slow' ? '느려져서' : '빨라져서';
  const direction = car.firstCrossType === 'slow' 
    ? (wheel === 'L' ? '오른쪽' : '왼쪽')
    : (wheel === 'L' ? '왼쪽'   : '오른쪽');
  setSpeech(`✨ <b>${wheelName} 바퀴</b>가 먼저 <b>${speedWord}</b> 자동차가 <b>${direction}</b>으로 꺾였어요! 🔄`);
}

function drawCar(){
  // trail
  if (trail.length > 1){
    ctx.strokeStyle = 'rgba(239,68,68,0.55)'; ctx.lineWidth=2; ctx.setLineDash([4,4]);
    ctx.beginPath();
    for(let i=0;i<trail.length;i++){ const p=trail[i]; if(i===0) ctx.moveTo(p.Lx,p.Ly); else ctx.lineTo(p.Lx,p.Ly);}
    ctx.stroke();
    ctx.beginPath();
    for(let i=0;i<trail.length;i++){ const p=trail[i]; if(i===0) ctx.moveTo(p.Rx,p.Ry); else ctx.lineTo(p.Rx,p.Ry);}
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // 차체
  const leftVec = { x: Math.cos(car.angle), y: -Math.sin(car.angle) };
  const heading = { x: Math.sin(car.angle), y: Math.cos(car.angle) };
  const Lx = car.cx + HALF_W * leftVec.x, Ly = car.cy + HALF_W * leftVec.y;
  const Rx = car.cx - HALF_W * leftVec.x, Ry = car.cy - HALF_W * leftVec.y;

  ctx.save();
  ctx.translate(car.cx, car.cy);
  ctx.rotate(Math.atan2(heading.y, heading.x) - Math.PI/2);
  // 차체
  ctx.fillStyle = '#ef4444';
  ctx.strokeStyle = '#7f1d1d'; ctx.lineWidth=2;
  roundRect(-HALF_W+3, -CAR_LEN/2, (HALF_W-3)*2, CAR_LEN, 10, true, true);
  // 창문
  ctx.fillStyle = '#93c5fd';
  roundRect(-HALF_W+8, -CAR_LEN/2+8, (HALF_W-8)*2, 18, 4, true, false);
  // 헤드라이트
  ctx.fillStyle = '#fef08a';
  ctx.fillRect(-HALF_W+6, CAR_LEN/2-6, 6, 4);
  ctx.fillRect(HALF_W-12, CAR_LEN/2-6, 6, 4);
  ctx.restore();

  // 바퀴
  drawWheel(Lx, Ly, 'L');
  drawWheel(Rx, Ry, 'R');
}

function drawWheel(x,y,label){
  const inSlow = y >= BOUNDARY_Y;
  const slow = scenario.ratio < 1;
  // 색깔: 경계 위쪽=원래 매질 (녹색), 아래쪽=다른 매질(빨강)
  // 단 slow일 때는 빨강, fast일 때는 파랑
  const below = y >= BOUNDARY_Y;
  const color = below ? (slow ? '#dc2626' : '#2563eb') : '#16a34a';
  ctx.fillStyle = color;
  ctx.strokeStyle = '#111827';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(x,y,11,0,Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.fillStyle = 'white';
  ctx.font = 'bold 13px sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(label, x, y);
}

function roundRect(x,y,w,h,r,fill,stroke){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y, x+w,y+h, r);
  ctx.arcTo(x+w,y+h, x,y+h, r);
  ctx.arcTo(x,y+h, x,y, r);
  ctx.arcTo(x,y, x+w,y, r);
  ctx.closePath();
  if(fill) ctx.fill();
  if(stroke) ctx.stroke();
}

// ===== 빛 시뮬레이션 (2개 광선) =====
let light = null;

function initLight(){
  cancelAnimationFrame(animId);
  const angleRad = incAngleDeg * Math.PI/180;
  // 두 광선을 평행하게 배치, 진행 방향에 수직인 wavefront
  const heading = { x: Math.sin(angleRad), y: Math.cos(angleRad) };
  const perp = { x: Math.cos(angleRad), y: -Math.sin(angleRad) }; // 왼쪽 방향
  const startCx = 180, startCy = 50;
  const sep = 60; // 광선 간격
  light = {
    angle: angleRad,
    refractedAngle: null,
    rays: [
      { // 왼쪽 광선
        origin: { x: startCx + perp.x*sep/2, y: startCy + perp.y*sep/2 },
        tip:    { x: startCx + perp.x*sep/2, y: startCy + perp.y*sep/2 },
        path: [{ x: startCx + perp.x*sep/2, y: startCy + perp.y*sep/2 }],
        dir: { ...heading },
        speed: 1.0,
        crossed: false,
      },
      { // 오른쪽 광선
        origin: { x: startCx - perp.x*sep/2, y: startCy - perp.y*sep/2 },
        tip:    { x: startCx - perp.x*sep/2, y: startCy - perp.y*sep/2 },
        path: [{ x: startCx - perp.x*sep/2, y: startCy - perp.y*sep/2 }],
        dir: { ...heading },
        speed: 1.0,
        crossed: false,
      },
    ],
    phase: 0, // 0 출발전 1 주행중 2 종료
    firstCrossIdx: null,
  };
  draw();
  setSpeech('💡 버튼을 눌러 빛을 쏘아보세요!');
}

function stepLight(){
  const base = 2.8;
  let allDone = true;
  for (let i=0;i<light.rays.length;i++){
    const r = light.rays[i];
    if (r.tip.y > H + 20 || r.tip.x < -20 || r.tip.x > W+20) continue;
    allDone = false;

    // 경계 넘는 순간 체크
    if (!r.crossed && r.tip.y + r.dir.y*base*r.speed >= BOUNDARY_Y){
      // 경계점에서 굴절
      // 경계까지 조금만 이동
      const t = (BOUNDARY_Y - r.tip.y) / (r.dir.y * base * r.speed);
      r.tip.x += r.dir.x * base * r.speed * t;
      r.tip.y = BOUNDARY_Y;
      r.path.push({ x: r.tip.x, y: r.tip.y });

      // 굴절각 계산 (스넬)
      const sinTheta1 = Math.sin(light.angle); // 법선(수직) 기준
      let sinTheta2 = scenario.ratio * sinTheta1;
      sinTheta2 = Math.max(-1, Math.min(1, sinTheta2));
      const theta2 = Math.asin(sinTheta2);
      r.dir = { x: Math.sin(theta2), y: Math.cos(theta2) };
      r.speed = scenario.ratio; // 아래쪽 매질 속도
      r.crossed = true;
      if (light.firstCrossIdx === null) light.firstCrossIdx = i;
      if (light.refractedAngle === null) light.refractedAngle = theta2;
    }

    // 직진
    r.tip.x += r.dir.x * base * r.speed;
    r.tip.y += r.dir.y * base * r.speed;
    r.path.push({ x: r.tip.x, y: r.tip.y });
  }
  draw();
  if (!allDone) animId = requestAnimationFrame(stepLight);
  else finishLight();
}

function finishLight(){
  const deg1 = incAngleDeg;
  const deg2 = light.refractedAngle!==null ? Math.round(light.refractedAngle*180/Math.PI) : '-';
  const faster = scenario.ratio > 1;
  const dir = faster ? '기준선에서 멀어지는 쪽' : '기준선에 가까워지는 쪽';
  const speedWord = faster ? '빨라져서' : '느려져서';
  setSpeech(`✨ 빛이 <b>${deg1}°</b>로 들어가서 <b>${deg2}°</b>로 꺾였어요! 두 광선 중 먼저 경계에 닿은 광선이 <b>${speedWord}</b> 전체 빛이 <b>${dir}</b>으로 꺾입니다. 🌈`);
}

function drawLight(){
  if (!light) return;
  for (let i=0;i<light.rays.length;i++){
    const r = light.rays[i];
    // 경로
    ctx.strokeStyle = '#fde047';
    ctx.lineWidth = 4;
    ctx.shadowColor = '#fbbf24';
    ctx.shadowBlur = 12;
    ctx.beginPath();
    for(let j=0;j<r.path.length;j++){
      const p = r.path[j];
      if (j===0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y);
    }
    ctx.stroke();
    ctx.shadowBlur = 0;

    // 광선 머리
    ctx.fillStyle = '#fef3c7';
    ctx.beginPath(); ctx.arc(r.tip.x, r.tip.y, 6, 0, Math.PI*2); ctx.fill();
  }
  // 법선 (기준선)
  const midX = (light.rays[0].tip.x + light.rays[1].tip.x)/2;
  ctx.strokeStyle='rgba(255,255,255,0.4)'; ctx.lineWidth=1.5; ctx.setLineDash([3,4]);
  // 항상 캔버스 중앙에 기준선 표시
  ctx.beginPath();
  ctx.moveTo(W/2, 20); ctx.lineTo(W/2, H-20); ctx.stroke();
  ctx.setLineDash([]);
}

// ===== 공통 =====
function draw(){
  ctx.clearRect(0,0,W,H);
  drawBackground();
  if (mode==='car' && car) drawCar();
  if (mode==='light' && light) drawLight();
}

function setSpeech(html){
  document.getElementById('speech').innerHTML = html;
}

// ===== UI =====
function renderPresets(){
  const box = document.getElementById('presets');
  box.innerHTML='';
  const list = mode==='car' ? CAR_SCENARIOS : LIGHT_SCENARIOS;
  list.forEach(s => {
    const b = document.createElement('button');
    b.textContent = s.name;
    if (s.id === scenario.id) b.classList.add('active');
    b.onclick = () => {
      scenario = s;
      // 각도 슬라이더 최대값 조정
      const slider = document.getElementById('angle');
      slider.max = s.maxAngle;
      if (incAngleDeg > s.maxAngle){ incAngleDeg = s.maxAngle; slider.value = s.maxAngle; document.getElementById('angleVal').textContent=s.maxAngle+'°'; }
      if (mode==='car') initCar(); else initLight();
      renderPresets();
    };
    box.appendChild(b);
  });
}

document.getElementById('modeCar').onclick = () => {
  mode='car'; scenario = CAR_SCENARIOS[0];
  document.getElementById('modeCar').classList.add('active');
  document.getElementById('modeLight').classList.remove('active');
  renderPresets(); initCar();
};
document.getElementById('modeLight').onclick = () => {
  mode='light'; scenario = LIGHT_SCENARIOS[0];
  document.getElementById('modeLight').classList.add('active');
  document.getElementById('modeCar').classList.remove('active');
  renderPresets(); initLight();
};

document.getElementById('angle').oninput = (e) => {
  incAngleDeg = parseInt(e.target.value);
  document.getElementById('angleVal').textContent = incAngleDeg + '°';
  if (mode==='car') initCar(); else initLight();
};

document.getElementById('go').onclick = () => {
  cancelAnimationFrame(animId);
  if (mode==='car'){ initCar(); animId = requestAnimationFrame(stepCar); }
  else { initLight(); animId = requestAnimationFrame(stepLight); }
};

// 초기화
renderPresets();
initCar();
</script>
</body>
</html>
