/* ========== 굴절 계산 ========== */
// 눈(공기)과 물고기(물) 사이에서 수면 위의 굴절점 P를 찾는다.
// 스넬의 법칙: n_water * sin(θ_water) = n_air * sin(θ_air)
// 부호까지 포함해서 이분탐색으로 해를 찾는다.
function refractionPoint(eye, fish) {
  // 안전 처리: 물고기는 반드시 수면 아래에 있어야 함
  const fy = Math.max(fish.y, WATER_Y + 10);
  const ey = Math.min(eye.y, WATER_Y - 10);

  let lo = Math.min(eye.x, fish.x);
  let hi = Math.max(eye.x, fish.x);
  const g = (px) => {
    const da = Math.hypot(px - eye.x, WATER_Y - ey) || 1e-9;
    const dw = Math.hypot(px - fish.x, fy - WATER_Y) || 1e-9;
    // 빛은 물고기→P→눈으로 이동. 수평 방향은 동일한 부호.
    // n_water * (px - fish.x)/dw  ==  (eye.x - px)/da
    return N_WATER * (px - fish.x) / dw - (eye.x - px) / da;
  };
  // 경계에서 g(lo) < 0, g(hi) > 0 이 되는지 확인 후 이분탐색
  let glo = g(lo), ghi = g(hi);
  if (glo * ghi > 0) {
    // 눈과 물고기가 거의 같은 x에 있을 때 (수직). 그냥 중간.
    const px0 = (eye.x + fish.x) / 2;
    return {
      px: px0, py: WATER_Y,
      thetaAir: Math.atan2(Math.abs(px0 - eye.x), WATER_Y - ey),
      thetaWater: Math.atan2(Math.abs(px0 - fish.x), fy - WATER_Y),
      apparent: { x: fish.x, y: WATER_Y + (fy - WATER_Y) / N_WATER }
    };
  }
  // 경계 방향 정렬: lo에서 g<0, hi에서 g>0
  if (glo > 0) { [lo, hi] = [hi, lo]; }
  for (let i = 0; i < 80; i++) {
    const mid = (lo + hi) / 2;
    if (g(mid) > 0) hi = mid; else lo = mid;
  }
  const px = (lo + hi) / 2;

  const thetaAir = Math.atan2(Math.abs(px - eye.x), WATER_Y - ey);
  const thetaWater = Math.atan2(Math.abs(px - fish.x), fy - WATER_Y);

  // 겉보기 위치: 눈→P 직선을 물속으로 연장, 겉보기 깊이 = 실제 깊이 / n
  const realDepth = fy - WATER_Y;
  const appDepth = realDepth / N_WATER;
  const appY = WATER_Y + appDepth; // 항상 수면 아래
  const t = (appY - ey) / (WATER_Y - ey);
  const appX = eye.x + t * (px - eye.x);

  return { px, py: WATER_Y, thetaAir, thetaWater, apparent: { x: appX, y: appY } };
}

/* ========== 보조 컴포넌트 ========== */
function waveLine() {
  let d = `M 0 ${WATER_Y}`;
  for (let x = 0; x <= W; x += 15) {
    const y = WATER_Y + Math.sin(x * 0.12) * 2.2;
    d += ` L ${x} ${y.toFixed(2)}`;
  }
  return d;
}

function Observer({ x, y }) {
  return (
    <g>
      {/* 보트 */}

      <line x1={x-55} y1={WATER_Y-2} x2={x+55} y2={WATER_Y-2} stroke="#a86b3a" strokeWidth="2"/>
      {/* 몸통 */}
      <line x1={x} y1={y+22} x2={x} y2={WATER_Y-3} stroke="#0ea5e9" strokeWidth="5" strokeLinecap="round"/>

}

function Fish({ x, y, ghost, showLabel }) {

function Spear({ current }) {
  const { from, to, p } = current;
  const x = from.x + (to.x - from.x) * p;
  const y = from.y + (to.y - from.y) * p;
  const angle = Math.atan2(to.y - from.y, to.x - from.x);
  const len = 38;
  const tailX = x - Math.cos(angle) * len;
  const tailY = y - Math.sin(angle) * len;
  const headX1 = x - Math.cos(angle - 0.35) * 10;
  const headY1 = y - Math.sin(angle - 0.35) * 10;
  const headX2 = x - Math.cos(angle + 0.35) * 10;
  const headY2 = y - Math.sin(angle + 0.35) * 10;
  return (
    <g>
      <line x1={tailX} y1={tailY} x2={x} y2={y} stroke="#e5e7eb" strokeWidth="3" strokeLinecap="round"/>
      <line x1={tailX} y1={tailY} x2={x} y2={y} stroke="#facc15" strokeWidth="1"/>
      <polygon points={`${x},${y} ${headX1},${headY1} ${headX2},${headY2}`} fill="#f59e0b" stroke="#78350f" strokeWidth="0.8"/>
    </g>
  );
}

function ToggleBtn({ on, setOn, label }) {

    <button onClick={() => setOn(!on)}
      className={`btn px-3 py-1.5 rounded-lg text-xs font-bold border ${on ? 'bg-cyan-600/30 border-cyan-400 text-cyan-200' : 'bg-slate-800 border-slate-600 text-slate-400'}`}>
      {on ? '✓' : '·'} {label}
    </button>
  );
}

/* ========== 메인 게임 ========== */
function Game() {
  const [screen, setScreen] = useState('intro');
  const [levelIdx, setLevelIdx] = useState(0);
  const [cleared, setCleared] = useState([]);
  const [attempts, setAttempts] = useState(0);
  const [quizIdx, setQuizIdx] = useState(0);
  const [quizCorrect, setQuizCorrect] = useState(0);
  const [quizAnswered, setQuizAnswered] = useState(null);

  const [aim, setAim] = useState(null);
  const [spear, setSpear] = useState(null);
  const [result, setResult] = useState(null);
  const [showApparent, setShowApparent] = useState(true);
  const [showAngles, setShowAngles] = useState(true);
  const [showReal, setShowReal] = useState(true);

  const level = LEVELS[levelIdx];
  const [fishPos, setFishPos] = useState(level.fish);

  // 레벨 진입 시 초기화
  useEffect(() => {
    setFishPos(LEVELS[levelIdx].fish);
    setAim(null); setSpear(null); setResult(null); setAttempts(0);
  }, [levelIdx]);

  // 움직이는 물고기 (레벨 5)
  useEffect(() => {
    if (!level.moving) return;
    if (result === 'hit') return;
    let raf;
    const start = performance.now();
    const base = level.fish;
    const loop = (now) => {
      const dt = (now - start) / 1000;
      const nx = base.x + Math.sin(dt * 0.9) * 130;
      const ny = base.y + Math.sin(dt * 1.4) * 22;
      // 반드시 수면 아래로 클램프
      const cx = Math.max(260, Math.min(740, nx));
      const cy = Math.max(WATER_Y + 80, Math.min(H - 50, ny));
      setFishPos({ x: cx, y: cy });
      raf = requestAnimationFrame(loop);
    };
    raf = requestAnimationFrame(loop);
    return () => cancelAnimationFrame(raf);
  }, [levelIdx, level.moving, result]);

  const refData = useMemo(() => refractionPoint(level.eye, fishPos), [level.eye, fishPos.x, fishPos.y]);

  const handleClick = (e) => {
    if (spear || result === 'hit') return;
    const svg = e.currentTarget;
    const rect = svg.getBoundingClientRect();
    const x = (e.clientX - rect.left) * W / rect.width;
    const y = (e.clientY - rect.top) * H / rect.height;
    if (y < WATER_Y + 5) return; // 수면 아래만 조준 가능
    setAim({ x, y });
    setResult(null);
  };

  const throwSpear = () => {
    if (!aim || spear) return;
    const from = level.eye;
    const to = { ...aim };
    const fishAtThrow = { ...fishPos };
    const start = performance.now();
    const dur = 450;
    const step = (now) => {
      const p = Math.min(1, (now - start) / dur);
      setSpear({ from, to, p });
      if (p < 1) requestAnimationFrame(step);
      else {
        const d = Math.hypot(to.x - fishAtThrow.x, to.y - fishAtThrow.y);
        setAttempts(a => a + 1);
        if (d < level.tol) {
          setResult('hit');
          if (!cleared.includes(levelIdx)) setCleared([...cleared, levelIdx]);
        } else {
          setResult('miss');
        }
      }
    };
    requestAnimationFrame(step);
  };

  const resetAim = () => { setAim(null); setSpear(null); setResult(null); };

  const nextLevel = () => {
    if (levelIdx < LEVELS.length - 1) setLevelIdx(levelIdx + 1);
    else setScreen('quiz');
  };

  const answerQuiz = (ans) => {
    if (quizAnswered) return;
    setQuizAnswered(ans);
    if (ans === QUIZ[quizIdx].a) setQuizCorrect(c => c + 1);
  };
  const nextQuiz = () => {
    setQuizAnswered(null);
    if (quizIdx < QUIZ.length - 1) setQuizIdx(i => i + 1);
    else setScreen('end');
  };

  const restart = () => {
    setScreen('intro'); setLevelIdx(0); setCleared([]); setAttempts(0);
    setQuizIdx(0); setQuizCorrect(0); setQuizAnswered(null);
    setAim(null); setSpear(null); setResult(null);
  };

  /* ---------- Intro ---------- */
  if (screen === 'intro') {
    return (
      <div className="min-h-screen flex items-center justify-center p-6">
        <div className="max-w-xl w-full glass border border-slate-700 rounded-3xl p-8 shadow-2xl">
          <div className="text-center">
            <div className="text-6xl mb-3">🐟🗡</div>
            <h1 className="text-3xl font-extrabold text-cyan-300 mb-2">빛의 굴절 · 작살 낚시</h1>
            <p className="text-sm text-slate-400 mb-6">중학교 2학년 · 빛의 굴절 학습 시뮬레이션</p>
          </div>
          <div className="bg-slate-800/70 rounded-2xl p-5 mb-6 text-sm leading-relaxed">
            <p className="mb-2">💡 빛이 <b className="text-yellow-300">물에서 공기로</b> 나올 때 경로가 <b>꺾여요(굴절)</b>.</p>
            <p className="mb-2">👀 그래서 관찰자의 눈에는 물고기가 <b className="text-yellow-300">실제보다 얕은 곳</b>에 있는 것처럼 보입니다.</p>
            <p>🗡 하지만 작살은 빛이 아니라 <b>물체</b>라서 직선으로 날아가요. 그래서 <b className="text-cyan-300">'보이는 곳'보다 더 아래</b>를 조준해야 맞힐 수 있어요!</p>
          </div>
          <button onClick={() => setScreen('play')}
            className="btn w-full py-3 bg-cyan-500 hover:bg-cyan-400 text-slate-900 font-extrabold rounded-xl text-lg">
            게임 시작 →
          </button>
        </div>
      </div>
    );
  }

  /* ---------- Quiz ---------- */
  if (screen === 'quiz') {
    const q = QUIZ[quizIdx];
    return (
      <div className="min-h-screen flex items-center justify-center p-6">
        <div className="max-w-xl w-full glass border border-slate-700 rounded-3xl p-8 shadow-2xl">
          <div className="flex justify-between text-xs text-slate-400 mb-2">
            <span>OX 퀴즈</span><span>{quizIdx + 1} / {QUIZ.length} · 정답 {quizCorrect}</span>
          </div>
          <div className="w-full bg-slate-800 rounded-full h-2 mb-6">
            <div className="bg-cyan-400 h-2 rounded-full transition-all" style={{width:`${((quizIdx)/QUIZ.length)*100}%`}}/>
          </div>
          <div className="bg-slate-800/70 rounded-2xl p-6 mb-6 text-center text-lg font-semibold min-h-[100px] flex items-center justify-center">
            {q.q}
          </div>
          <div className="grid grid-cols-2 gap-3 mb-4">
            <button onClick={() => answerQuiz('O')} disabled={!!quizAnswered}
              className={`btn py-5 rounded-2xl text-3xl font-black border-2 ${
                !quizAnswered ? 'bg-slate-800 border-slate-600 hover:border-green-400 hover:bg-green-900/30' :
                quizAnswered === 'O' ? (q.a==='O' ? 'bg-green-600 border-green-300 text-white' : 'bg-red-600 border-red-300 text-white') :
                (q.a==='O' ? 'bg-green-900/50 border-green-500 text-green-200' : 'bg-slate-800 border-slate-700 text-slate-500')
              }`}>O</button>
            <button onClick={() => answerQuiz('X')} disabled={!!quizAnswered}
              className={`btn py-5 rounded-2xl text-3xl font-black border-2 ${
                !quizAnswered ? 'bg-slate-800 border-slate-600 hover:border-red-400 hover:bg-red-900/30' :
                quizAnswered === 'X' ? (q.a==='X' ? 'bg-green-600 border-green-300 text-white' : 'bg-red-600 border-red-300 text-white') :
                (q.a==='X' ? 'bg-green-900/50 border-green-500 text-green-200' : 'bg-slate-800 border-slate-700 text-slate-500')
              }`}>X</button>
          </div>
          {quizAnswered && (
            <div className={`p-4 rounded-xl mb-4 ${quizAnswered===q.a ? 'bg-green-900/40 border border-green-500/50' : 'bg-red-900/40 border border-red-500/50'}`}>
              <div className="font-bold">{quizAnswered===q.a ? '✅ 정답!' : `❌ 오답 (정답: ${q.a})`}</div>
            </div>
          )}
          {quizAnswered && (
            <button onClick={nextQuiz} className="btn w-full py-3 bg-cyan-500 hover:bg-cyan-400 text-slate-900 font-bold rounded-xl">
              {quizIdx < QUIZ.length - 1 ? '다음 문제 →' : '결과 보기 →'}
            </button>
          )}
        </div>
      </div>
    );
  }

  /* ---------- End ---------- */
  if (screen === 'end') {
    const pct = Math.round((quizCorrect / QUIZ.length) * 100);
    return (
      <div className="min-h-screen flex items-center justify-center p-6">
        <div className="max-w-xl w-full glass border border-slate-700 rounded-3xl p-8 shadow-2xl text-center">
          <div className="text-6xl mb-3">🏆</div>
          <h1 className="text-3xl font-extrabold text-yellow-300 mb-4">수고했어요!</h1>
          <div className="grid grid-cols-2 gap-3 mb-6">
            <div className="bg-slate-800/70 rounded-2xl p-5">
              <div className="text-xs text-slate-400 mb-1">클리어 단계</div>
              <div className="text-3xl font-black text-cyan-300">{cleared.length} / {LEVELS.length}</div>
            </div>
            <div className="bg-slate-800/70 rounded-2xl p-5">
              <div className="text-xs text-slate-400 mb-1">퀴즈 정답</div>
              <div className="text-3xl font-black text-cyan-300">{quizCorrect} / {QUIZ.length}</div>
              <div className="text-xs text-slate-400 mt-1">{pct}%</div>
            </div>
          </div>
          <div className="bg-slate-800/70 rounded-2xl p-5 mb-6 text-sm text-left leading-relaxed">
            <div className="font-bold text-cyan-300 mb-2">📚 오늘 배운 것</div>
            <ul className="list-disc list-inside space-y-1 text-slate-300">
              <li>빛이 <b>다른 매질로 들어갈 때 경로가 꺾이는</b> 현상 = 굴절</li>
              <li><b>입사각이 커지면 굴절각도 커진다</b></li>
              <li>물속 물고기는 <b>실제보다 얕게</b> 보이므로, 작살은 <b>더 아래</b>를 노려야 한다</li>
            </ul>
          </div>
          <button onClick={restart} className="btn w-full py-3 bg-cyan-500 hover:bg-cyan-400 text-slate-900 font-bold rounded-xl">
            다시 하기
          </button>
        </div>
      </div>
    );
  }

  /* ---------- Play ---------- */
  const { eye } = level;
  const { px, py, thetaAir, thetaWater, apparent } = refData;
  const deg = r => (r * 180 / Math.PI);

  return (
    <div className="min-h-screen p-4 sm:p-6">
      <div className="max-w-4xl mx-auto">
        {/* 헤더 */}
        <div className="flex items-center justify-between mb-3 flex-wrap gap-2">
          <div>
            <div className="text-xs text-slate-400">Level {levelIdx+1} / {LEVELS.length} · 시도 {attempts}회</div>
            <h2 className="text-xl font-extrabold text-cyan-300">{level.title}</h2>
          </div>
          <div className="flex gap-2 flex-wrap">
            <ToggleBtn on={showApparent} setOn={setShowApparent} label="보이는 위치"/>
            <ToggleBtn on={showReal} setOn={setShowReal} label="실제 위치"/>
            <ToggleBtn on={showAngles} setOn={setShowAngles} label="법선·각도"/>
          </div>
        </div>
        <p className="text-sm text-slate-300 bg-slate-800/60 border border-slate-700 p-3 rounded-xl mb-3">💡 {level.hint}</p>

        {/* SVG 씬 */}
        <div className="rounded-2xl overflow-hidden border border-slate-700 bg-slate-950 shadow-2xl">
          <svg viewBox={`0 0 ${W} ${H}`} className="w-full cursor-crosshair select-none" onClick={handleClick}>
            <defs>
              <linearGradient id="skyG" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0" stopColor="#0a1428"/>
                <stop offset="1" stopColor="#2a5bb5"/>
              </linearGradient>
              <linearGradient id="waterG" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0" stopColor="#0b5f78"/>
                <stop offset="1" stopColor="#021c2e"/>
              </linearGradient>
            </defs>
            <rect x="0" y="0" width={W} height={WATER_Y} fill="url(#skyG)"/>
            <rect x="0" y={WATER_Y} width={W} height={H - WATER_Y} fill="url(#waterG)"/>
            {/* 해/구름 */}
            <circle cx={680} cy={70} r={26} fill="#fde68a" opacity="0.95"/>
            <circle cx={680} cy={70} r={34} fill="#fde68a" opacity="0.3"/>
            <path d="M 40 50 q 15 -10 30 0 q 15 -8 25 4 q -10 12 -30 8 q -15 4 -25 -12 z" fill="#e2e8f0" opacity="0.6"/>
            {/* 수면 */}
            <path d={waveLine()} stroke="#67e8f9" strokeWidth="2" fill="none" opacity="0.7"/>
            {/* 해저 */}
            <path d={`M 0 ${H-25} Q ${W*0.3} ${H-55} ${W*0.55} ${H-35} T ${W} ${H-20} L ${W} ${H} L 0 ${H} Z`} fill="#6b4423"/>
            <path d={`M 0 ${H-25} Q ${W*0.3} ${H-55} ${W*0.55} ${H-35} T ${W} ${H-20}`} stroke="#8b5a2b" strokeWidth="1.5" fill="none"/>
            {/* 해초 */}
            {[120, 300, 560, 720].map((sx, i) => (
              <path key={i} d={`M ${sx} ${H-30} Q ${sx+8} ${H-60} ${sx-3} ${H-85} Q ${sx+10} ${H-110} ${sx} ${H-135}`}
                    stroke="#059669" strokeWidth="3" fill="none" opacity="0.7" strokeLinecap="round"/>
            ))}

            {/* 법선 (점선 수직선) */}
            {showAngles && (
              <line x1={px} y1={WATER_Y - 55} x2={px} y2={WATER_Y + 55} stroke="#fcd34d" strokeWidth="1.2" strokeDasharray="4 3" opacity="0.85"/>
            )}

            {/* 빛 경로: 물고기 → P → 눈 */}
            <line x1={fishPos.x} y1={fishPos.y} x2={px} y2={WATER_Y} stroke="#fef08a" strokeWidth="2.2" opacity="0.95"/>
            <line x1={px} y1={WATER_Y} x2={eye.x} y2={eye.y+8} stroke="#fef08a" strokeWidth="2.2" opacity="0.95"/>

            {/* 겉보기 연장선 (눈→겉보기) */}
            {showApparent && (
              <line x1={eye.x} y1={eye.y+8} x2={apparent.x} y2={apparent.y} stroke="#fde047" strokeWidth="1.4" strokeDasharray="5 4" opacity="0.55"/>
            )}

            {/* 각도 수치 */}
            {showAngles && (() => {
              // 공기 쪽 각도 라벨 위치
              const airSide = eye.x > px ? 1 : -1;
              const waterSide = fishPos.x > px ? 1 : -1;
              return (
                <g>
                  <text x={px + airSide * 18} y={WATER_Y - 20} fill="#fde68a" fontSize="13"
                        textAnchor={airSide > 0 ? "start" : "end"} fontWeight="bold">
                    입사각 {deg(thetaAir).toFixed(0)}°
                  </text>
                  <text x={px + waterSide * 18} y={WATER_Y + 30} fill="#fde68a" fontSize="13"
                        textAnchor={waterSide > 0 ? "start" : "end"} fontWeight="bold">
                    굴절각 {deg(thetaWater).toFixed(0)}°
                  </text>
                  {/* 각도 호 */}
                  <path d={describeArc(px, WATER_Y, 24, -90, -90 + airSide * deg(thetaAir))}
                        stroke="#fde68a" strokeWidth="1.2" fill="none"/>
                  <path d={describeArc(px, WATER_Y, 24, 90 - waterSide * deg(thetaWater), 90)}
                        stroke="#fde68a" strokeWidth="1.2" fill="none"/>
                </g>
              );
            })()}

            {/* 관찰자 */}
            <Observer x={eye.x} y={eye.y}/>

            {/* 겉보기 물고기 */}
            {showApparent && <Fish x={apparent.x} y={apparent.y} ghost showLabel={true}/>}
            {/* 실제 물고기 */}
            {showReal && <Fish x={fishPos.x} y={fishPos.y} showLabel={true}/>}
            {/* 실제 위치 숨김 상태라도 spear 결과 판정용은 내부적으로 유지됨 (안 그림) */}

            {/* 조준 마커 */}
            {aim && !spear && (
              <g>
                <circle cx={aim.x} cy={aim.y} r="12" fill="none" stroke="#f87171" strokeWidth="2">
                  <animate attributeName="r" values="10;16;10" dur="1s" repeatCount="indefinite"/>
                </circle>
                <line x1={aim.x-14} y1={aim.y} x2={aim.x+14} y2={aim.y} stroke="#f87171" strokeWidth="2"/>
                <line x1={aim.x} y1={aim.y-14} x2={aim.x} y2={aim.y+14} stroke="#f87171" strokeWidth="2"/>
              </g>
            )}

            {/* 작살 */}
            {spear && <Spear current={spear}/>}

            {/* 안내 텍스트 */}
            {!aim && !spear && (
              <text x={W/2} y={H-60} textAnchor="middle" fill="#fcd34d" fontSize="14" opacity="0.85">
                물속을 클릭해서 작살을 조준하세요
              </text>
            )}
          </svg>
        </div>

        {/* 컨트롤 */}
        <div className="mt-3 flex gap-2 flex-wrap">
          {!result && (
            <button disabled={!aim || !!spear} onClick={throwSpear}
              className="btn px-5 py-2.5 bg-cyan-600 hover:bg-cyan-500 disabled:bg-slate-700 disabled:text-slate-500 text-white font-bold rounded-xl">
              🗡 작살 던지기
            </button>
          )}
          {aim && !result && !spear && (
            <button onClick={resetAim} className="btn px-4 py-2.5 bg-slate-700 hover:bg-slate-600 text-white rounded-xl">조준 취소</button>
          )}
          {result === 'miss' && (
            <button onClick={resetAim} className="btn px-5 py-2.5 bg-amber-500 hover:bg-amber-400 text-slate-900 font-bold rounded-xl">🔄 다시 조준</button>
          )}
          {result === 'hit' && (
            <button onClick={nextLevel} className="btn px-5 py-2.5 bg-green-500 hover:bg-green-400 text-slate-900 font-bold rounded-xl">
              {levelIdx < LEVELS.length-1 ? '다음 단계 →' : '퀴즈로 →'}
            </button>
          )}
        </div>

        {/* 결과 피드백 */}
        {result && (
          <div className={`mt-3 p-4 rounded-xl ${result==='hit' ? 'bg-green-900/40 border border-green-500/60' : 'bg-red-900/40 border border-red-500/60'}`}>
            {result === 'hit' ? (
              <div>
                <div className="font-bold text-green-300 text-lg">🎯 명중!</div>
                <div className="text-sm text-slate-300 mt-1">{level.lesson}</div>
              </div>
            ) : (
              <div>
                <div className="font-bold text-red-300 text-lg">❌ 빗나갔어요!</div>
                <div className="text-sm text-slate-300 mt-1">
                  빛은 수면에서 꺾여요. 그래서 '<b className="text-yellow-300">보이는 위치</b>'는 실제보다 <b>얕은 곳</b>에 나타나요.
                  작살은 직선으로 날아가니, <b className="text-cyan-300">보이는 곳보다 더 아래</b>를 조준해 보세요!
                </div>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

// 각도 호 그리기 helper
function polarToCartesian(cx, cy, r, angleDeg) {
  const a = angleDeg * Math.PI / 180;
  return { x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) };
}
function describeArc(cx, cy, r, startAngle, endAngle) {
  const start = polarToCartesian(cx, cy, r, startAngle);
  const end = polarToCartesian(cx, cy, r, endAngle);
  const largeArc = Math.abs(endAngle - startAngle) <= 180 ? 0 : 1;
  const sweep = endAngle > startAngle ? 1 : 0;
  return `M ${start.x.toFixed(2)} ${start.y.toFixed(2)} A ${r} ${r} 0 ${largeArc} ${sweep} ${end.x.toFixed(2)} ${end.y.toFixed(2)}`;
}

ReactDOM.createRoot(document.getElementById('root')).render(<Game/>);
</script>
</body>
</html>
"""

with open('/home/user/refraction_game.html', 'w', encoding='utf-8') as f:
    f.write(html)

print("OK", len(html), "bytes")
